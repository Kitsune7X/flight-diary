services:
  app:
    build:
      context: ./flight-diary-frontend
      dockerfile: Dockerfile
      target: production
    container_name: flight-diary-frontend-prod

  server:
    build:
      context: ./flight-diary-backend
      dockerfile: Dockerfile
      target: production
    container_name: flight-diary-backend-prod

  nginx:
    image: nginx:trixie-perl
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '${PROXY_PORT:-8080}:80'
    container_name: flight-diary-proxy-prod
    depends_on:
      - app
      - server
