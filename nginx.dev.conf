events { }

http {
  server {
    listen 80;
    location / {
      # For hot loading
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';

      # Pass request to app
      proxy_pass http://app:5173;
    }

      # Since I already use proxy in vite.config.ts, proxy_pass here for /api to the backend is not necessary
  }
}